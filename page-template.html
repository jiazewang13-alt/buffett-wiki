<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{TITLE} - 巴菲特百科</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f7fa;
        }
        .content-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: white;
            min-height: 100vh;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #2d5a87;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        h1 {
            color: #1e3a5f;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #2d5a87;
        }
        h2 {
            color: #2d5a87;
            margin: 40px 0 20px;
            font-size: 1.5rem;
        }
        h3 {
            color: #333;
            margin: 30px 0 15px;
            font-size: 1.2rem;
        }
        p { margin-bottom: 15px; line-height: 1.8; }
        blockquote {
            border-left: 4px solid #2d5a87;
            padding-left: 20px;
            margin: 20px 0;
            color: #555;
            font-style: italic;
        }
        ul, ol { margin: 20px 0; padding-left: 30px; }
        li { margin-bottom: 10px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th { background: #f5f7fa; font-weight: 600; }
        footer {
            background: #1e3a5f;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="content-page">
        <a href="../index.html" class="back-link">← 返回首页</a>
        {CONTENT}
    </div>
    <footer>
        <p>巴菲特百科 · 系统整理巴菲特投资思想的中文知识站</p>
    </footer>
</body>
</html>
